<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro — HabitQuest</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/registro.css">
</head>
<body>
<div class="bg-grid"></div>
<div class="container">
  <a href="index.html" class="back-btn">← REGRESAR</a>
  <div class="card">
    <div class="card-title">★ CREAR CUENTA</div>
    <div class="card-sub">Únete a HabitQuest y comienza tu aventura académica</div>
    <div class="error" id="errMsg"></div>
    <div class="success" id="successMsg">¡CUENTA CREADA! REDIRIGIENDO...</div>
    <form id="regForm">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">NOMBRE</label>
          <input class="form-input" id="rNombre" type="text" placeholder="Tu nombre" required>
        </div>
        <div class="form-group">
          <label class="form-label">APELLIDO</label>
          <input class="form-input" id="rApellido" type="text" placeholder="Tu apellido" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">CORREO ELECTRÓNICO</label>
        <input class="form-input" id="rEmail" type="email" placeholder="correo@ejemplo.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">CARRERA</label>
        <select class="career-select" id="rCarrera">
          <option value="Ingeniería en Sistemas">Ingeniería en Sistemas</option>
          <option value="Ingeniería Civil">Ingeniería Civil</option>
          <option value="Ingeniería Industrial">Ingeniería Industrial</option>
          <option value="Otra">Otra carrera</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">CONTRASEÑA</label>
        <input class="form-input" id="rPass" type="password" placeholder="Mínimo 6 caracteres" required>
      </div>
      <div class="form-group">
        <label class="form-label">CONFIRMAR CONTRASEÑA</label>
        <input class="form-input" id="rPass2" type="password" placeholder="Repite tu contraseña" required>
      </div>
      <button type="submit" class="btn-submit">★ CREAR CUENTA Y JUGAR</button>
    </form>
    <div class="login-link">¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a></div>
  </div>
</div>
<script src="js/registro.js"></script>
</body>
</html>
