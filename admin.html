<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin — HabitQuest</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/admin.css">
</head>
<body>
<nav>
  <div class="nav-logo">HABITQUEST<br><span style="font-size:.4rem;">PANEL ADMINISTRADOR</span></div>
  <div class="nav-right">
    <span class="admin-badge">★ ADMIN</span>
    <button class="btn-logout" onclick="logout()">SALIR</button>
  </div>
</nav>
<main>
  <div class="tabs">
    <button class="tab active" onclick="showTab('overview',this)">📊 RESUMEN</button>
    <button class="tab" onclick="showTab('users',this)">👥 USUARIOS</button>
    <button class="tab" onclick="showTab('sessions',this)">🎮 PARTIDAS</button>
    <button class="tab" onclick="showTab('charts',this)">📈 ESTADÍSTICAS</button>
  </div>
  
  <!-- OVERVIEW -->
  <div class="page active" id="page-overview">
    <div class="stats-row">
      <div class="stat-box"><span class="sbox-num" id="ovUsers">0</span><div class="sbox-lbl">USUARIOS</div></div>
      <div class="stat-box"><span class="sbox-num" id="ovSessions">0</span><div class="sbox-lbl">PARTIDAS</div></div>
      <div class="stat-box"><span class="sbox-num" id="ovAvgScore">0%</span><div class="sbox-lbl">PROM. PUNTAJE</div></div>
      <div class="stat-box"><span class="sbox-num" id="ovTopXP">0</span><div class="sbox-lbl">XP MÁX</div></div>
    </div>
    <div class="section-h">🏆 TOP 5 ESTUDIANTES</div>
    <table id="topTable"><tr><th>#</th><th>NOMBRE</th><th>CARRERA</th><th>XP</th><th>JUEGOS</th><th>RACHA</th></tr></table>
    <div class="section-h">🎮 ÚLTIMAS PARTIDAS</div>
    <table id="recentTable"><tr><th>ESTUDIANTE</th><th>DINÁMICA</th><th>PUNTAJE</th><th>XP</th><th>FECHA</th></tr></table>
  </div>
  
  <!-- USERS -->
  <div class="page" id="page-users">
    <div class="section-h">👥 TODOS LOS USUARIOS</div>
    <div id="usersTableWrap"></div>
  </div>
  
  <!-- SESSIONS -->
  <div class="page" id="page-sessions">
    <div class="section-h">🎮 HISTORIAL DE PARTIDAS</div>
    <div id="sessionsTableWrap"></div>
  </div>
  
  <!-- CHARTS -->
  <div class="page" id="page-charts">
    <div class="section-h">📈 RENDIMIENTO POR DINÁMICA</div>
    <div id="gamesChart"></div>
    <div class="section-h">🎓 DISTRIBUCIÓN DE XP</div>
    <div id="xpChart"></div>
  </div>
</main>

<!-- MODAL -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<script src="js/admin.js"></script>
</body>
</html>
