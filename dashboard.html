<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — HabitQuest</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--dark:#0a0c1a;--darker:#060810;--card:#111326;--card2:#161930;--border:#c0392b;--gold:#f39c12;--teal:#1abc9c;--red:#e74c3c;--cream:#f5e6c8;--pixel:'Press Start 2P',monospace;--body:'Rajdhani',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--body);background:var(--dark);color:var(--cream);min-height:100vh;}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.1) 2px,rgba(0,0,0,.1) 4px);}
nav{background:var(--darker);border-bottom:3px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 4%;height:60px;position:sticky;top:0;z-index:100;}
.nav-logo{font-family:var(--pixel);font-size:.58rem;color:var(--gold);}
.nav-user{display:flex;align-items:center;gap:12px;}
.user-badge{font-family:var(--pixel);font-size:.38rem;color:var(--teal);border:2px solid var(--teal);padding:5px 10px;}
.nav-xp{font-family:var(--pixel);font-size:.42rem;color:var(--gold);}
.btn-logout{font-family:var(--pixel);font-size:.38rem;color:var(--red);border:2px solid var(--red);padding:5px 10px;background:none;cursor:pointer;}
.btn-logout:hover{background:var(--red);color:#fff;}
main{max-width:1100px;margin:0 auto;padding:28px 4%;}
.tabs{display:flex;gap:0;border-bottom:3px solid var(--border);margin-bottom:28px;overflow-x:auto;}
.tab{font-family:var(--pixel);font-size:.38rem;padding:12px 16px;cursor:pointer;border:none;background:none;color:rgba(245,230,200,.5);border-bottom:3px solid transparent;transition:.2s;white-space:nowrap;margin-bottom:-3px;}
.tab:hover{color:var(--cream);}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.page{display:none;}.page.active{display:block;}
/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:28px;}
.stat-box{background:var(--card);border:3px solid var(--border);padding:18px;text-align:center;box-shadow:3px 3px 0 rgba(192,57,43,.3);}
.sbox-num{font-family:var(--pixel);font-size:1.2rem;display:block;margin-bottom:6px;}
.sbox-lbl{font-family:var(--pixel);font-size:.32rem;color:rgba(245,230,200,.5);}
/* LEVEL */
.level-box{background:var(--card);border:3px solid var(--gold);padding:20px;margin-bottom:28px;box-shadow:4px 4px 0 rgba(243,156,18,.3);}
.level-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.level-name{font-family:var(--pixel);font-size:.55rem;color:var(--gold);}
.level-xp{font-family:var(--pixel);font-size:.42rem;color:rgba(245,230,200,.6);}
.progress-bg{background:#000;border:2px solid var(--border);height:16px;position:relative;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--gold));transition:width .6s;}
.progress-txt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--pixel);font-size:.3rem;color:#fff;}
/* GAMES */
.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;}
.game-card{background:var(--card);border:3px solid var(--border);overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s;box-shadow:4px 4px 0 rgba(192,57,43,.3);}
.game-card:hover{transform:translate(-3px,-3px);box-shadow:6px 6px 0 var(--gold);}
.game-card.locked{opacity:.5;cursor:not-allowed;}
.game-thumb{height:110px;display:flex;align-items:center;justify-content:center;font-size:2.8rem;position:relative;}
.gt1{background:linear-gradient(135deg,#1a0a2e,#4a1942);}
.gt2{background:linear-gradient(135deg,#0a1a2e,#0a3d5c);}
.gt3{background:linear-gradient(135deg,#1a2e0a,#2d5c0a);}
.gt4{background:linear-gradient(135deg,#2e1a0a,#5c3d0a);}
.game-pixel-grid{position:absolute;inset:0;opacity:.2;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:16px 16px;}
.game-info{padding:14px;}
.game-title{font-family:var(--pixel);font-size:.42rem;color:var(--gold);margin-bottom:5px;}
.game-desc{font-size:.85rem;color:rgba(245,230,200,.7);line-height:1.5;margin-bottom:8px;}
.game-xp{font-family:var(--pixel);font-size:.35rem;background:var(--border);color:#fff;padding:3px 8px;display:inline-block;}
.game-done{font-family:var(--pixel);font-size:.35rem;background:var(--teal);color:#000;padding:3px 8px;display:inline-block;}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.hidden{display:none;}
.modal{background:var(--card);border:3px solid var(--border);box-shadow:8px 8px 0 rgba(192,57,43,.5);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;padding:28px;}
.modal-title{font-family:var(--pixel);font-size:.65rem;color:var(--gold);margin-bottom:20px;text-align:center;}
/* QUIZ */
.quiz-q{font-size:1.05rem;font-weight:600;line-height:1.6;margin-bottom:18px;color:var(--cream);}
.quiz-opts{display:flex;flex-direction:column;gap:10px;}
.quiz-opt{background:#000;border:2px solid var(--border);padding:12px 16px;cursor:pointer;font-family:var(--body);font-size:.95rem;color:var(--cream);transition:.2s;text-align:left;}
.quiz-opt:hover{border-color:var(--gold);background:rgba(243,156,18,.08);}
.quiz-opt.correct{border-color:var(--teal);background:rgba(26,188,156,.12);color:var(--teal);}
.quiz-opt.wrong{border-color:var(--red);background:rgba(231,76,60,.12);color:var(--red);}
.quiz-progress{display:flex;gap:6px;margin-bottom:20px;}
.qp-dot{width:16px;height:16px;border:2px solid var(--border);}
.qp-dot.done{background:var(--teal);border-color:var(--teal);}
.qp-dot.active{background:var(--gold);border-color:var(--gold);}
/* MEMORY */
.memory-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.mem-card{aspect-ratio:1;background:#000;border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-family:var(--pixel);padding:6px;text-align:center;transition:.2s;line-height:1.3;}
.mem-card.flipped{background:var(--card2);border-color:var(--gold);}
.mem-card.matched{background:rgba(26,188,156,.15);border-color:var(--teal);cursor:default;}
.mem-card.wrong-flash{background:rgba(231,76,60,.2);border-color:var(--red);}
/* TIME BREAKER */
.time-slots{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
.time-slot{background:#000;border:2px solid var(--border);padding:10px 14px;cursor:grab;display:flex;align-items:center;gap:10px;font-size:.9rem;}
.time-slot.dragging{opacity:.5;border-color:var(--gold);}
.time-slot.drag-over{border-color:var(--teal);background:rgba(26,188,156,.1);}
.slot-time{font-family:var(--pixel);font-size:.35rem;color:var(--gold);min-width:60px;}
/* PRIORITY */
.matrix-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-bottom:20px;}
.matrix-cell{background:var(--card2);border:2px solid var(--border);padding:12px;min-height:100px;}
.matrix-cell h4{font-family:var(--pixel);font-size:.35rem;margin-bottom:8px;}
.matrix-cell.q1 h4{color:var(--red);}
.matrix-cell.q2 h4{color:var(--gold);}
.matrix-cell.q3 h4{color:var(--teal);}
.matrix-cell.q4 h4{color:rgba(245,230,200,.5);}
.task-item{background:#000;border:2px solid var(--border);padding:7px 10px;font-size:.82rem;cursor:pointer;margin-bottom:5px;transition:.2s;}
.task-item:hover{border-color:var(--gold);}
.task-pool{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;}
/* RESULTS */
.results-list{display:flex;flex-direction:column;gap:10px;}
.result-item{background:var(--card2);border:2px solid var(--border);padding:14px;display:flex;align-items:center;justify-content:space-between;}
.result-game{font-family:var(--pixel);font-size:.38rem;color:var(--gold);}
.result-score{font-family:var(--pixel);font-size:.42rem;}
.result-date{font-size:.8rem;color:rgba(245,230,200,.5);}
.score-s{color:var(--teal);}
.score-m{color:var(--gold);}
.score-l{color:var(--red);}
/* TOAST */
.toast{position:fixed;top:80px;right:20px;z-index:800;background:var(--card);border:3px solid var(--teal);box-shadow:4px 4px 0 rgba(26,188,156,.4);padding:16px 22px;transform:translateX(120%);transition:.4s;max-width:280px;}
.toast.show{transform:translateX(0);}
.toast-title{font-family:var(--pixel);font-size:.42rem;color:var(--teal);margin-bottom:4px;}
.toast-sub{font-size:.85rem;color:rgba(245,230,200,.7);}
/* BTN UTIL */
.btn-sm{font-family:var(--pixel);font-size:.38rem;padding:9px 16px;border:2px solid;cursor:pointer;transition:.1s;}
.btn-gold{border-color:var(--gold);color:var(--gold);background:rgba(243,156,18,.08);}
.btn-gold:hover{background:var(--gold);color:var(--darker);}
.btn-red{border-color:var(--red);color:var(--red);background:rgba(231,76,60,.08);}
.btn-red:hover{background:var(--red);color:#fff;}
.btn-teal{border-color:var(--teal);color:var(--teal);background:rgba(26,188,156,.08);}
.btn-teal:hover{background:var(--teal);color:var(--darker);}
@media(max-width:600px){.memory-grid{grid-template-columns:repeat(3,1fr);}main{padding:20px 3%;}
.modal{padding:20px;}.stats-row{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>
<nav>
  <div class="nav-logo">HABITQUEST</div>
  <div class="nav-user">
    <span class="nav-xp">⚡ <span id="navXP">0</span> XP</span>
    <span class="user-badge" id="navUser">JUGADOR</span>
    <button class="btn-logout" onclick="logout()">SALIR</button>
  </div>
</nav>
<div class="toast" id="toast"><div class="toast-title" id="toastTitle"></div><div class="toast-sub" id="toastSub"></div></div>
<main>
  <div class="tabs">
    <button class="tab active" onclick="showTab('home',this)">🏠 INICIO</button>
    <button class="tab" onclick="showTab('games',this)">🎮 DINÁMICAS</button>
    <button class="tab" onclick="showTab('results',this)">📊 MIS RESULTADOS</button>
    <button class="tab" onclick="showTab('metas',this)">🎯 METAS</button>
  </div>
  <!-- HOME -->
  <div class="page active" id="page-home">
    <div class="stats-row">
      <div class="stat-box"><span class="sbox-num" id="hStreak" style="color:var(--red)">🔥 0</span><div class="sbox-lbl">RACHA DÍAS</div></div>
      <div class="stat-box"><span class="sbox-num" id="hXP" style="color:var(--gold)">⚡ 0</span><div class="sbox-lbl">XP TOTAL</div></div>
      <div class="stat-box"><span class="sbox-num" id="hGames" style="color:var(--teal)">🎮 0</span><div class="sbox-lbl">JUEGOS COMPLETADOS</div></div>
      <div class="stat-box"><span class="sbox-num" id="hMetas" style="color:#a29bfe)">✅ 0</span><div class="sbox-lbl">METAS LOGRADAS</div></div>
    </div>
    <div class="level-box">
      <div class="level-top">
        <div class="level-name" id="levelName">🌱 SEMILLERO</div>
        <div class="level-xp"><span id="levelXP">0</span> / <span id="levelNext">200</span> XP</div>
      </div>
      <div class="progress-bg">
        <div class="progress-fill" id="levelBar" style="width:0%"></div>
        <div class="progress-txt">NIVEL <span id="levelNum">1</span></div>
      </div>
    </div>
    <div style="font-family:var(--pixel);font-size:.5rem;color:var(--gold);margin-bottom:16px;">▶ DINÁMICAS DISPONIBLES HOY</div>
    <div class="games-grid" id="homeGames"></div>
  </div>
  <!-- GAMES -->
  <div class="page" id="page-games">
    <div style="font-family:var(--pixel);font-size:.55rem;color:var(--gold);margin-bottom:20px;">🎮 TODAS LAS DINÁMICAS</div>
    <div class="games-grid" id="allGames"></div>
  </div>
  <!-- RESULTS -->
  <div class="page" id="page-results">
    <div style="font-family:var(--pixel);font-size:.55rem;color:var(--gold);margin-bottom:20px;">📊 MIS RESULTADOS</div>
    <div class="results-list" id="resultsList"></div>
  </div>
  <!-- METAS -->
  <div class="page" id="page-metas">
    <div style="font-family:var(--pixel);font-size:.55rem;color:var(--gold);margin-bottom:20px;">🎯 MIS METAS</div>
    <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;">
      <input id="metaInput" type="text" placeholder="Escribe una nueva meta..." style="flex:1;min-width:200px;background:#000;border:2px solid var(--border);color:var(--cream);padding:10px 14px;font-family:var(--body);font-size:.95rem;outline:none;">
      <button onclick="addMeta()" class="btn-sm btn-gold">+ AGREGAR</button>
    </div>
    <div id="metasList"></div>
  </div>
</main>
<!-- MODAL -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>
<script>
const LEVELS=[{n:'🌱 SEMILLERO',x:0},{n:'📖 APRENDIZ',x:200},{n:'⚡ ESTUDIOSO',x:500},{n:'🎓 ACADÉMICO',x:1000},{n:'🏆 MAESTRO',x:2000},{n:'🌟 LEYENDA',x:4000}];
const GAMES=[
  {id:'quiz',emoji:'❓',title:'QUIZ BOSS',desc:'Responde todas las preguntas correctamente para derrotar al jefe. ¡Sin errores!',xp:100,type:'quiz',class:'gt3'},
  {id:'memory',emoji:'🧩',title:'MEMORY MATRIX',desc:'Empareja técnicas de estudio con sus definiciones en este juego de pares.',xp:60,type:'memory',class:'gt2'},
  {id:'time',emoji:'⏱️',title:'TIME BREAKER',desc:'Ordena los bloques de tiempo en el horario correcto. ¡Contra el reloj!',xp:80,type:'time',class:'gt1'},
  {id:'priority',emoji:'🎯',title:'PRIORITY RUSH',desc:'Clasifica las tareas en la Matriz Eisenhower antes que se acabe el tiempo.',xp:70,type:'priority',class:'gt4'},
];

let currentUser=null;
let gameState={};

function init(){
  const u=localStorage.getItem('hq_current');
  if(!u){window.location.href='login.html';return;}
  currentUser=JSON.parse(u);
  if(currentUser.role==='admin'){window.location.href='admin.html';return;}
  document.getElementById('navUser').textContent=currentUser.nombre.toUpperCase();
  syncUser();
  updateUI();
  renderGames();
  renderResults();
  renderMetas();
}

function syncUser(){
  const users=JSON.parse(localStorage.getItem('hq_users')||'[]');
  const idx=users.findIndex(u=>u.id===currentUser.id);
  if(idx>=0){currentUser=users[idx];localStorage.setItem('hq_current',JSON.stringify(currentUser));}
}

function saveUser(){
  const users=JSON.parse(localStorage.getItem('hq_users')||'[]');
  const idx=users.findIndex(u=>u.id===currentUser.id);
  if(idx>=0){users[idx]=currentUser;localStorage.setItem('hq_users',JSON.stringify(users));localStorage.setItem('hq_current',JSON.stringify(currentUser));}
}

function updateUI(){
  const xp=currentUser.xp||0;
  const streak=currentUser.streak||0;
  const games=(currentUser.completedGames||[]).length;
  const metas=(currentUser.metas||[]).filter(m=>m.done).length;
  document.getElementById('navXP').textContent=xp;
  document.getElementById('hStreak').textContent='🔥 '+streak;
  document.getElementById('hXP').textContent='⚡ '+xp;
  document.getElementById('hGames').textContent='🎮 '+games;
  document.getElementById('hMetas').textContent='✅ '+metas;
  let lvl=0;
  for(let i=LEVELS.length-1;i>=0;i--){if(xp>=LEVELS[i].x){lvl=i;break;}}
  const next=lvl<LEVELS.length-1?LEVELS[lvl+1].x:LEVELS[lvl].x+1000;
  const cur=LEVELS[lvl].x;
  const pct=Math.min(100,((xp-cur)/(next-cur))*100);
  document.getElementById('levelName').textContent=LEVELS[lvl].n;
  document.getElementById('levelNum').textContent=lvl+1;
  document.getElementById('levelXP').textContent=xp;
  document.getElementById('levelNext').textContent=next;
  document.getElementById('levelBar').style.width=pct+'%';
}

function renderGames(){
  const done=currentUser.completedGames||[];
  const html=GAMES.map(g=>{
    const isDone=done.includes(g.id);
    return `<div class="game-card" onclick="startGame('${g.id}')">
      <div class="game-thumb ${g.class}"><div class="game-pixel-grid"></div><span>${g.emoji}</span></div>
      <div class="game-info">
        <div class="game-title">${g.title}</div>
        <div class="game-desc">${g.desc}</div>
        ${isDone?`<span class="game-done">✓ COMPLETADO</span>`:`<span class="game-xp">+${g.xp} XP</span>`}
      </div></div>`;
  }).join('');
  document.getElementById('homeGames').innerHTML=html;
  document.getElementById('allGames').innerHTML=html;
}

function renderResults(){
  const results=currentUser.gameResults||[];
  const el=document.getElementById('resultsList');
  if(!results.length){el.innerHTML='<div style="background:var(--card);border:3px solid var(--border);padding:28px;text-align:center;font-family:var(--pixel);font-size:.4rem;color:rgba(245,230,200,.4);">AÚN NO HAS JUGADO<br>¡COMPLETA TU PRIMERA DINÁMICA!</div>';return;}
  el.innerHTML=results.slice().reverse().map(r=>{
    const sc=r.score>=80?'score-s':r.score>=50?'score-m':'score-l';
    return `<div class="result-item">
      <div><div class="result-game">${r.gameName}</div><div class="result-date">${new Date(r.date).toLocaleDateString('es')}</div></div>
      <div class="result-score ${sc}">${r.score}% | +${r.xpEarned} XP</div></div>`;
  }).join('');
}

function renderMetas(){
  const metas=currentUser.metas||[];
  const el=document.getElementById('metasList');
  if(!metas.length){el.innerHTML='<div style="color:rgba(245,230,200,.4);padding:20px;text-align:center;font-family:var(--pixel);font-size:.38rem;">AGREGA TU PRIMERA META</div>';return;}
  el.innerHTML=metas.map((m,i)=>`
    <div style="background:var(--card);border:3px solid ${m.done?'var(--teal)':'var(--border)'};padding:14px 18px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;box-shadow:3px 3px 0 ${m.done?'rgba(26,188,156,.3)':'rgba(192,57,43,.2)'};">
      <div style="display:flex;align-items:center;gap:12px;">
        <div onclick="toggleMeta(${i})" style="width:22px;height:22px;border:2px solid ${m.done?'var(--teal)':'var(--border)'};background:${m.done?'var(--teal)':'transparent'};cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.8rem;">${m.done?'✓':''}</div>
        <span style="font-size:.95rem;${m.done?'text-decoration:line-through;color:rgba(245,230,200,.4);':''}">${m.text}</span>
      </div>
      <button onclick="deleteMeta(${i})" style="background:none;border:none;color:rgba(245,230,200,.4);cursor:pointer;font-size:1.1rem;padding:4px;">🗑</button>
    </div>`).join('');
}

function addMeta(){
  const inp=document.getElementById('metaInput');
  const val=inp.value.trim();
  if(!val)return;
  if(!currentUser.metas)currentUser.metas=[];
  currentUser.metas.unshift({text:val,done:false,createdAt:new Date().toISOString()});
  saveUser();renderMetas();inp.value='';
  showToast('★ META AGREGADA','¡Completa tus metas para ganar XP!');
}

function toggleMeta(i){
  if(currentUser.metas[i].done)return;
  currentUser.metas[i].done=true;
  currentUser.xp=(currentUser.xp||0)+30;
  updateStreak();saveUser();renderMetas();updateUI();
  showToast('✅ META COMPLETADA','+30 XP ganados');
  spawnConfetti();
}

function deleteMeta(i){currentUser.metas.splice(i,1);saveUser();renderMetas();}

function updateStreak(){
  const today=new Date().toDateString();
  if(currentUser.lastStudy!==today){
    if(currentUser.lastStudy){
      const diff=Math.floor((new Date()-new Date(currentUser.lastStudy))/86400000);
      currentUser.streak=diff===1?(currentUser.streak||0)+1:1;
    }else{currentUser.streak=1;}
    currentUser.lastStudy=today;
  }
}

function showToast(title,sub){
  document.getElementById('toastTitle').textContent=title;
  document.getElementById('toastSub').textContent=sub;
  const t=document.getElementById('toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

function showTab(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  if(btn)btn.classList.add('active');
  if(id==='results')renderResults();
  if(id==='metas')renderMetas();
}

function logout(){localStorage.removeItem('hq_current');window.location.href='index.html';}

// ── GAMES ──
function startGame(id){
  const g=GAMES.find(x=>x.id===id);
  if(!g)return;
  gameState={id,xp:g.xp,name:g.title};
  if(g.type==='quiz')startQuiz();
  else if(g.type==='memory')startMemory();
  else if(g.type==='time')startTime();
  else if(g.type==='priority')startPriority();
}

function closeModal(){document.getElementById('modalOverlay').classList.add('hidden');}
function openModal(html){document.getElementById('modalContent').innerHTML=html;document.getElementById('modalOverlay').classList.remove('hidden');}

// QUIZ
const QUIZ_QS=[
  {q:'¿Cuántos minutos de trabajo propone el Método Pomodoro?',opts:['15 min','20 min','25 min','30 min'],c:2},
  {q:'¿Qué hace la Repetición Espaciada con el aprendizaje?',opts:['Memoriza en una noche','Repasa en intervalos crecientes','Estudia solo de noche','Usa colores para recordar'],c:1},
  {q:'¿Cómo se llama el estrés moderado que mejora el rendimiento?',opts:['Distress','Burnout','Eustress','Ansiedad'],c:2},
  {q:'Según Ausubel, el aprendizaje significativo requiere...',opts:['Memorización pura','Relación con conocimientos previos','Estudiar solo','Leer en voz alta'],c:1},
  {q:'¿Qué porcentaje de retención puede reducirse al dormir menos de 6 horas?',opts:['10%','20%','30%','40%'],c:3},
  {q:'¿En qué año fue creada la Universidad Mesoamericana formalmente?',opts:['1996','1999','2000','1987'],c:1},
  {q:'¿Qué es la Regla 80/20 aplicada al estudio?',opts:['Estudiar 80% del día','El 20% del esfuerzo produce el 80% de los resultados','Hacer el 80% de las tareas','Descansar 20 min'],c:1},
  {q:'¿Cuál técnica consiste en explicar un tema como si enseñaras a un niño?',opts:['Método SQ3R','Técnica Feynman','Mapa Mental','Pomodoro'],c:1},
];
let quizState={};
function startQuiz(){
  quizState={qs:shuffle([...QUIZ_QS]).slice(0,5),current:0,errors:0};
  showQuizQ();
}
function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function showQuizQ(){
  const q=quizState.qs[quizState.current];
  const dots=quizState.qs.map((_,i)=>`<div class="qp-dot ${i<quizState.current?'done':i===quizState.current?'active':''}"></div>`).join('');
  openModal(`
    <div class="modal-title">❓ QUIZ BOSS — PREGUNTA ${quizState.current+1}/${quizState.qs.length}</div>
    <div class="quiz-progress">${dots}</div>
    <div class="quiz-q">${q.q}</div>
    <div class="quiz-opts">
      ${q.opts.map((o,i)=>`<button class="quiz-opt" onclick="answerQuiz(${i})">${o}</button>`).join('')}
    </div>`);
}
function answerQuiz(idx){
  const q=quizState.qs[quizState.current];
  const btns=document.querySelectorAll('.quiz-opt');
  btns.forEach((b,i)=>{b.style.pointerEvents='none';if(i===q.c)b.classList.add('correct');if(i===idx&&idx!==q.c)b.classList.add('wrong');});
  if(idx!==q.c){
    quizState.errors++;
    setTimeout(()=>openModal(`<div class="modal-title" style="color:var(--red)">❌ ¡INCORRECTO!</div>
      <div style="text-align:center;padding:16px;font-size:1rem;color:rgba(245,230,200,.7);margin-bottom:24px;">Debes responder TODAS correctamente.<br>Reiniciando desde la pregunta 1...</div>
      <div style="text-align:center;"><button class="btn-sm btn-red" onclick="startQuiz()">🔄 REINTENTAR</button></div>`),800);
    return;
  }
  setTimeout(()=>{
    quizState.current++;
    if(quizState.current<quizState.qs.length)showQuizQ();
    else completeGame(100,100);
  },700);
}

// MEMORY
const MEM_PAIRS=[
  {k:'POMODORO',v:'25 min concentrado + 5 min descanso'},
  {k:'FEYNMAN',v:'Explica el tema como a un niño'},
  {k:'EUSTRESS',v:'Estrés moderado que mejora el rendimiento'},
  {k:'AUSUBEL',v:'Aprendizaje significativo con conocimientos previos'},
  {k:'PDCA',v:'Planificar-Hacer-Verificar-Actuar'},
  {k:'80/20',v:'20% esfuerzo produce 80% resultados'},
];
let memState={};
function startMemory(){
  const pairs=shuffle([...MEM_PAIRS]).slice(0,4);
  const cards=shuffle([...pairs.map(p=>({text:p.k,pair:p.k})),...pairs.map(p=>({text:p.v,pair:p.k}))]);
  memState={cards,flipped:[],matched:0,moves:0};
  renderMemory();
}
function renderMemory(){
  openModal(`<div class="modal-title">🧩 MEMORY MATRIX</div>
    <div style="text-align:center;margin-bottom:14px;font-family:var(--pixel);font-size:.38rem;color:rgba(245,230,200,.6);">MOVIMIENTOS: ${memState.moves} | PARES: ${memState.matched}/4</div>
    <div class="memory-grid">${memState.cards.map((c,i)=>{
      const f=memState.flipped.includes(i)||c.matched;
      const cls=c.matched?'mem-card matched':`mem-card ${f?'flipped':''}`;
      return `<div class="${cls}" onclick="flipCard(${i})">${f?c.text:'?'}</div>`;
    }).join('')}</div>`);
}
function flipCard(i){
  const c=memState.cards;
  if(c[i].matched||memState.flipped.includes(i)||memState.flipped.length>=2)return;
  memState.flipped.push(i);memState.moves++;
  if(memState.flipped.length===2){
    const [a,b]=memState.flipped;
    if(c[a].pair===c[b].pair&&a!==b){
      c[a].matched=true;c[b].matched=true;memState.matched++;memState.flipped=[];
      renderMemory();
      if(memState.matched===4)setTimeout(()=>completeGame(100,100),400);
    }else{
      renderMemory();
      setTimeout(()=>{memState.flipped=[];renderMemory();},900);
      return;
    }
  }else renderMemory();
}

// TIME BREAKER
const TIME_SLOTS=[
  {label:'Estudiar Matemáticas',ideal:0},
  {label:'Descanso activo',ideal:1},
  {label:'Revisar apuntes',ideal:2},
  {label:'Ejercicios prácticos',ideal:3},
  {label:'Repaso final del día',ideal:4},
];
let timeState={};
function startTime(){
  timeState={slots:shuffle([...TIME_SLOTS]),dragIdx:null,timer:30,score:0};
  renderTime();
  let t=setInterval(()=>{
    timeState.timer--;
    const el=document.getElementById('timerDisplay');
    if(el)el.textContent=timeState.timer+'s';
    if(timeState.timer<=0){clearInterval(t);checkTime();}
  },1000);
  timeState.interval=t;
}
function renderTime(){
  openModal(`<div class="modal-title">⏱️ TIME BREAKER</div>
    <div style="text-align:center;font-family:var(--pixel);font-size:.5rem;color:var(--gold);margin-bottom:16px;">TIEMPO: <span id="timerDisplay">${timeState.timer}s</span></div>
    <p style="font-size:.9rem;color:rgba(245,230,200,.7);margin-bottom:14px;">Ordena las actividades en el orden correcto de una sesión de estudio efectiva (arrastra o haz clic para mover):</p>
    <div class="time-slots" id="timeSlots">
      ${timeState.slots.map((s,i)=>`<div class="time-slot" draggable="true" data-i="${i}" 
        ondragstart="timeState.dragIdx=${i}" 
        ondragover="event.preventDefault();this.classList.add('drag-over')"
        ondragleave="this.classList.remove('drag-over')"
        ondrop="dropTime(${i},this)">
        <span class="slot-time">${i+1}.</span>${s.label}</div>`).join('')}
    </div>
    <button class="btn-sm btn-gold" onclick="checkTime()" style="width:100%;margin-top:8px;">✓ VERIFICAR ORDEN</button>`);
}
function dropTime(toIdx,el){
  el.classList.remove('drag-over');
  const from=timeState.dragIdx;
  if(from===null||from===toIdx)return;
  const tmp=timeState.slots[from];
  timeState.slots[from]=timeState.slots[toIdx];
  timeState.slots[toIdx]=tmp;
  renderTime();
}
function checkTime(){
  clearInterval(timeState.interval);
  let correct=0;
  timeState.slots.forEach((s,i)=>{if(s.ideal===i)correct++;});
  const pct=Math.round((correct/TIME_SLOTS.length)*100);
  completeGame(pct,Math.round(pct*.8));
}

// PRIORITY RUSH
const TASKS=[
  {text:'Entregar proyecto de Programación I',u:true,i:true},
  {text:'Revisar redes sociales',u:false,i:false},
  {text:'Estudiar para examen de Cálculo',u:false,i:true},
  {text:'Llamada de papás',u:true,i:false},
  {text:'Leer capítulo de Física II',u:false,i:true},
  {text:'Ver serie en Netflix',u:false,i:false},
  {text:'Reunión urgente del equipo',u:true,i:true},
  {text:'Ordenar el escritorio',u:false,i:false},
];
let prioState={};
function startPriority(){
  prioState={tasks:shuffle([...TASKS]),placed:{q1:[],q2:[],q3:[],q4:[]},score:0,timer:45};
  renderPriority();
  let t=setInterval(()=>{
    prioState.timer--;
    const el=document.getElementById('prioTimer');
    if(el)el.textContent=prioState.timer+'s';
    if(prioState.timer<=0){clearInterval(t);checkPriority();}
  },1000);
  prioState.interval=t;
}
function renderPriority(){
  const placed=Object.values(prioState.placed).flat();
  const remaining=prioState.tasks.filter(t=>!placed.includes(t.text));
  openModal(`<div class="modal-title">🎯 PRIORITY RUSH</div>
    <div style="text-align:center;font-family:var(--pixel);font-size:.5rem;color:var(--gold);margin-bottom:12px;">TIEMPO: <span id="prioTimer">${prioState.timer}s</span></div>
    <p style="font-size:.85rem;color:rgba(245,230,200,.6);margin-bottom:12px;">Haz clic en una tarea y luego en el cuadrante donde debe ir:</p>
    <div class="task-pool">${remaining.map(t=>`<div class="task-item" onclick="selectTask('${t.text.replace(/'/g,"\'")}')" id="task_${t.text.replace(/\s/g,'_').replace(/[^a-zA-Z0-9_]/g,'')}" style="background:${prioState.selected===t.text?'rgba(243,156,18,.2)':'#000'};border-color:${prioState.selected===t.text?'var(--gold)':'var(--border)'};">${t.text}</div>`).join('')}</div>
    <div class="matrix-grid">
      <div class="matrix-cell q1" onclick="placeTo('q1')"><h4>🔴 URGENTE+IMPORTANTE</h4>${(prioState.placed.q1||[]).map(t=>`<div style="font-size:.75rem;padding:3px;color:var(--teal);">✓ ${t}</div>`).join('')}</div>
      <div class="matrix-cell q2" onclick="placeTo('q2')"><h4>🟡 NO URGENTE+IMPORTANTE</h4>${(prioState.placed.q2||[]).map(t=>`<div style="font-size:.75rem;padding:3px;color:var(--teal);">✓ ${t}</div>`).join('')}</div>
      <div class="matrix-cell q3" onclick="placeTo('q3')"><h4>🟢 URGENTE+NO IMPORTANTE</h4>${(prioState.placed.q3||[]).map(t=>`<div style="font-size:.75rem;padding:3px;color:var(--teal);">✓ ${t}</div>`).join('')}</div>
      <div class="matrix-cell q4" onclick="placeTo('q4')"><h4>⚫ NO URG+NO IMP</h4>${(prioState.placed.q4||[]).map(t=>`<div style="font-size:.75rem;padding:3px;color:var(--teal);">✓ ${t}</div>`).join('')}</div>
    </div>
    ${remaining.length===0?`<button class="btn-sm btn-gold" onclick="checkPriority()" style="width:100%;margin-top:10px;">✓ VERIFICAR</button>`:''}`);
}
function selectTask(txt){prioState.selected=txt;renderPriority();}
function placeTo(q){
  if(!prioState.selected)return;
  prioState.placed[q].push(prioState.selected);
  prioState.selected=null;
  renderPriority();
  const placed=Object.values(prioState.placed).flat();
  if(placed.length===prioState.tasks.length)setTimeout(()=>checkPriority(),400);
}
function checkPriority(){
  clearInterval(prioState.interval);
  let correct=0;
  TASKS.forEach(t=>{
    const correctQ=t.u&&t.i?'q1':!t.u&&t.i?'q2':t.u&&!t.i?'q3':'q4';
    if((prioState.placed[correctQ]||[]).includes(t.text))correct++;
  });
  const pct=Math.round((correct/TASKS.length)*100);
  completeGame(pct,Math.round(pct*.7));
}

// COMPLETE GAME
function completeGame(score,xpMult){
  const xpEarned=Math.round(gameState.xp*(xpMult/100));
  currentUser.xp=(currentUser.xp||0)+xpEarned;
  if(!currentUser.completedGames)currentUser.completedGames=[];
  if(!currentUser.completedGames.includes(gameState.id))currentUser.completedGames.push(gameState.id);
  if(!currentUser.gameResults)currentUser.gameResults=[];
  currentUser.gameResults.push({gameId:gameState.id,gameName:gameState.name,score,xpEarned,date:new Date().toISOString()});
  // Global sessions
  const sess=JSON.parse(localStorage.getItem('hq_game_sessions')||'[]');
  sess.push({userId:currentUser.id,userName:currentUser.nombre+' '+currentUser.apellido,gameId:gameState.id,gameName:gameState.name,score,xpEarned,date:new Date().toISOString()});
  localStorage.setItem('hq_game_sessions',JSON.stringify(sess));
  updateStreak();saveUser();updateUI();renderGames();
  const grade=score>=80?'S RANK 🏆':score>=60?'A RANK ⭐':'B RANK 📚';
  openModal(`<div class="modal-title" style="color:var(--teal);">✅ ¡COMPLETADO!</div>
    <div style="text-align:center;padding:20px;">
      <div style="font-size:3.5rem;margin-bottom:12px;">${score>=80?'🏆':score>=60?'⭐':'📚'}</div>
      <div style="font-family:var(--pixel);font-size:.8rem;color:var(--gold);margin-bottom:8px;">${grade}</div>
      <div style="font-family:var(--pixel);font-size:1.2rem;color:var(--teal);margin-bottom:8px;">${score}%</div>
      <div style="font-family:var(--pixel);font-size:.55rem;color:var(--gold);margin-bottom:20px;">+${xpEarned} XP GANADOS</div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
        <button class="btn-sm btn-teal" onclick="closeModal()">VER RESULTADOS</button>
        <button class="btn-sm btn-gold" onclick="startGame('${gameState.id}')">REPETIR</button>
      </div>
    </div>`);
  spawnConfetti();
  showToast('🏆 '+grade,'+'+xpEarned+' XP | '+gameState.name);
}

function spawnConfetti(){
  const colors=['#c0392b','#f39c12','#1abc9c','#00d4ff','#e74c3c'];
  for(let i=0;i<30;i++){
    const el=document.createElement('div');
    el.style.cssText=`position:fixed;z-index:9998;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;background:${colors[Math.floor(Math.random()*colors.length)]};left:${Math.random()*100}vw;top:0;animation:fall ${1.5+Math.random()*2}s linear forwards;border-radius:${Math.random()>.5?'50%':'0'};`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),3500);
  }
}
const style=document.createElement('style');
style.textContent='@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}';
document.head.appendChild(style);

init();
</script>
