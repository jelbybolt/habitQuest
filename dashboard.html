<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — HabitQuest</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
<nav>
  <div class="nav-logo">HABITQUEST</div>
  <div class="nav-user">
    <span class="nav-xp">Rayo <span id="navXP">0</span> XP</span>
    <span class="user-badge" id="navUser">JUGADOR</span>
    <button class="btn-logout" onclick="logout()">SALIR</button>
  </div>
</nav>
<div class="toast" id="toast"><div class="toast-title" id="toastTitle"></div><div class="toast-sub" id="toastSub"></div></div>
<main>
  <div class="tabs">
    <button class="tab active" onclick="showTab('home',this)">🏠 INICIO</button>
    <button class="tab" onclick="showTab('games',this)">🎮 DINÁMICAS</button>
    <button class="tab" onclick="showTab('results',this)">📊 MIS RESULTADOS</button>
    <button class="tab" onclick="showTab('metas',this)">🎯 METAS</button>
  </div>
  
  <!-- HOME -->
  <div class="page active" id="page-home">
    <div class="stats-row">
      <div class="stat-box"><span class="sbox-num" id="hStreak" style="color:var(--red)">🔥 0</span><div class="sbox-lbl">RACHA DÍAS</div></div>
      <div class="stat-box"><span class="sbox-num" id="hXP" style="color:var(--gold)">⚡ 0</span><div class="sbox-lbl">XP TOTAL</div></div>
      <div class="stat-box"><span class="sbox-num" id="hGames" style="color:var(--teal)">🎮 0</span><div class="sbox-lbl">JUEGOS COMPLETADOS</div></div>
      <div class="stat-box"><span class="sbox-num" id="hMetas" style="color:#a29bfe">✅ 0</span><div class="sbox-lbl">METAS LOGRADAS</div></div>
    </div>
    <div class="level-box">
      <div class="level-top">
        <div class="level-name" id="levelName">🌱 SEMILLERO</div>
        <div class="level-xp"><span id="levelXP">0</span> / <span id="levelNext">200</span> XP</div>
      </div>
      <div class="progress-bg">
        <div class="progress-fill" id="levelBar" style="width:0%"></div>
        <div class="progress-txt">NIVEL <span id="levelNum">1</span></div>
      </div>
    </div>
    <div style="font-family:var(--pixel);font-size:.5rem;color:var(--gold);margin-bottom:16px;">▶ DINÁMICAS DISPONIBLES</div>
    <div class="games-grid" id="homeGames"></div>
  </div>
  
  <!-- GAMES -->
  <div class="page" id="page-games">
    <div style="font-family:var(--pixel);font-size:.55rem;color:var(--gold);margin-bottom:20px;">🎮 TODAS LAS DINÁMICAS</div>
    <div class="games-grid" id="allGames"></div>
  </div>
  
  <!-- RESULTS -->
  <div class="page" id="page-results">
    <div style="font-family:var(--pixel);font-size:.55rem;color:var(--gold);margin-bottom:20px;">📊 MIS RESULTADOS</div>
    <div class="results-list" id="resultsList"></div>
  </div>
  
  <!-- METAS -->
  <div class="page" id="page-metas">
    <div style="font-family:var(--pixel);font-size:.55rem;color:var(--gold);margin-bottom:20px;">🎯 MIS METAS</div>
    <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;">
      <input id="metaInput" type="text" placeholder="Escribe una nueva meta..." style="flex:1;min-width:200px;background:#000;border:2px solid var(--border);color:var(--cream);padding:10px 14px;font-family:var(--body);font-size:.95rem;outline:none;">
      <button onclick="addMeta()" class="btn-sm btn-gold">+ AGREGAR</button>
    </div>
    <div id="metasList"></div>
  </div>
</main>

<!-- MODAL -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<script src="js/games.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
